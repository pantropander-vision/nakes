name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: 3f514c859c4e37ebbf25e729210f7c62
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Secret CLOUDFLARE_API_TOKEN tersimpan dengan teks tambahan/baris baru di
      # dalamnya, dan satu-satunya token valid di dalamnya hanya punya izin Pages
      # (tanpa D1). Pilih kandidat terbaik: utamakan yang punya D1 + Pages,
      # fallback ke Pages saja (migrasi DB dilewati dengan peringatan).
      - name: Resolve Cloudflare token
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          api="https://api.cloudflare.com/client/v4"
          candidates=()
          for c in $RAW_TOKEN; do candidates+=("$c"); done
          candidates+=("$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')")
          best=""; best_d1=0
          i=0
          for c in "${candidates[@]}"; do
            i=$((i+1))
            c="${c#Bearer}"
            c=$(printf '%s' "$c" | tr -cd 'A-Za-z0-9_-')
            [ -z "$c" ] && continue
            auth=(-H "Authorization: Bearer $c")
            d1=$(curl -s "${auth[@]}" "$api/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database" | grep -c '"success": *true' || true)
            pages=$(curl -s "${auth[@]}" "$api/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" | grep -c '"success": *true' || true)
            echo "kandidat #$i (panjang ${#c}): d1=$d1 pages=$pages"
            if [ "$pages" -ge 1 ]; then
              if [ "$d1" -ge 1 ]; then best="$c"; best_d1=1; break; fi
              [ -z "$best" ] && best="$c"
            fi
          done
          if [ -z "$best" ]; then
            echo "::error::Tidak ada token di secret CLOUDFLARE_API_TOKEN yang punya akses Pages untuk akun $CLOUDFLARE_ACCOUNT_ID. Buat token baru di dash.cloudflare.com -> My Profile -> API Tokens (izin: Cloudflare Pages:Edit dan D1:Edit), lalu simpan ulang sebagai secret CLOUDFLARE_API_TOKEN (satu baris)."
            exit 1
          fi
          echo "::add-mask::$best"
          echo "CLOUDFLARE_API_TOKEN=$best" >> "$GITHUB_ENV"
          echo "HAS_D1_ACCESS=$best_d1" >> "$GITHUB_ENV"
          if [ "$best_d1" = "0" ]; then
            echo "::warning::Token hanya punya akses Pages, TANPA D1 — migrasi database akan dilewati. Fitur admin dan lupa-password butuh migrasi! Buat token baru dengan izin 'Cloudflare Pages:Edit' + 'D1:Edit', simpan ulang secret CLOUDFLARE_API_TOKEN, lalu jalankan workflow 'D1 Database Tools' (apply-migrations, restore-data, set-admin)."
          fi
      - name: Apply D1 migrations
        run: |
          if [ "$HAS_D1_ACCESS" = "1" ]; then
            npx wrangler d1 migrations apply nakes-db --remote
          else
            echo "Dilewati: token tidak punya akses D1 (lihat peringatan di step sebelumnya)."
          fi
      - run: npx @cloudflare/next-on-pages
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .vercel/output/static --project-name=nakes
