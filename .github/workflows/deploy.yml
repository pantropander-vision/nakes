name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: 3f514c859c4e37ebbf25e729210f7c62
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Secret CLOUDFLARE_API_TOKEN tersimpan dengan teks tambahan/baris baru di
      # dalamnya sehingga wrangler gagal. Coba tiap potongan nilai secret terhadap
      # endpoint verifikasi token Cloudflare dan pakai yang benar-benar valid.
      - name: Resolve Cloudflare token
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          candidates=()
          for c in $RAW_TOKEN; do candidates+=("$c"); done
          candidates+=("$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')")
          for c in "${candidates[@]}"; do
            c="${c#Bearer}"
            c=$(printf '%s' "$c" | tr -cd 'A-Za-z0-9_-')
            [ -z "$c" ] && continue
            res=$(curl -s -H "Authorization: Bearer $c" https://api.cloudflare.com/client/v4/user/tokens/verify || true)
            if echo "$res" | grep -q '"success": *true'; then
              echo "::add-mask::$c"
              echo "CLOUDFLARE_API_TOKEN=$c" >> "$GITHUB_ENV"
              echo "Token Cloudflare valid ditemukan di dalam secret."
              exit 0
            fi
          done
          echo "::error::Tidak ada token valid di secret CLOUDFLARE_API_TOKEN. Buat ulang secret di Settings -> Secrets and variables -> Actions: paste API token Cloudflare dalam SATU baris (buat di dash.cloudflare.com -> My Profile -> API Tokens, izin: Cloudflare Pages:Edit dan D1:Edit)."
          exit 1
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply nakes-db --remote
      - run: npx @cloudflare/next-on-pages
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .vercel/output/static --project-name=nakes
