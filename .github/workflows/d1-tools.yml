# Perkakas manual untuk database D1 produksi (jalankan dari tab Actions).
#
# - apply-migrations : terapkan migrasi schema (juga otomatis saat deploy)
# - restore-data     : impor kembali data akun & lowongan dari data/nakes-restore-data.sql
#                      (INSERT OR IGNORE, aman dijalankan berulang; data yang sudah ada tidak ditimpa)
# - set-admin        : jadikan akun (berdasarkan email) sebagai admin
name: D1 Database Tools

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Aksi yang dijalankan'
        required: true
        type: choice
        options:
          - apply-migrations
          - restore-data
          - set-admin
      email:
        description: 'Email member (hanya untuk set-admin)'
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: 3f514c859c4e37ebbf25e729210f7c62
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Secret CLOUDFLARE_API_TOKEN tersimpan dengan baris baru/spasi di dalamnya,
      # yang membuat wrangler gagal ("invalid header value") — bersihkan dulu.
      - name: Sanitize Cloudflare token
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CLEAN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          echo "::add-mask::$CLEAN"
          echo "CLOUDFLARE_API_TOKEN=$CLEAN" >> "$GITHUB_ENV"

      - name: Apply migrations
        run: npx wrangler d1 migrations apply nakes-db --remote

      - name: Restore data
        if: inputs.action == 'restore-data'
        run: npx wrangler d1 execute nakes-db --remote --file=data/nakes-restore-data.sql

      - name: Set admin
        if: inputs.action == 'set-admin'
        run: |
          if [ -z "${{ inputs.email }}" ]; then
            echo "Input email wajib diisi untuk set-admin" >&2
            exit 1
          fi
          npx wrangler d1 execute nakes-db --remote --command "UPDATE users SET is_admin = 1 WHERE email = '${{ inputs.email }}'"
          npx wrangler d1 execute nakes-db --remote --command "SELECT id, email, username, is_admin FROM users WHERE email = '${{ inputs.email }}'"
